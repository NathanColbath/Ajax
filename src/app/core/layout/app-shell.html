<ajax-drawer
  class="shell"
  [(opened)]="drawerOpen"
  [mode]="drawerMode()"
  [fixedInViewport]="true"
  [autosize]="true"
  [width]="drawerWidth()"
  [class.shell--collapsed]="navCollapsed() && !isHandset()"
>
  <div
    drawer
    class="shell__nav"
    [class.shell__nav--collapsed]="navCollapsed() && !isHandset()"
  >
    <a
      routerLink="/"
      class="shell__brand"
      (click)="onNavClick()"
      [ajaxTooltip]="navCollapsed() && !isHandset() ? libraryName() : ''"
      ajaxTooltipPosition="right"
      [ajaxTooltipDisabled]="!(navCollapsed() && !isHandset())"
    >
      <img class="shell__logo" src="retologo.png" alt="" width="32" height="32" />
      <div class="shell__brand-text">
        <strong>{{ libraryName() }}</strong>
        <span>Collection Manager</span>
      </div>
    </a>

    <nav class="shell__links" aria-label="Primary">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.exact === true }"
          class="shell__link"
          (click)="onNavClick()"
          [ajaxTooltip]="navCollapsed() && !isHandset() ? item.label : ''"
          ajaxTooltipPosition="right"
          [ajaxTooltipDisabled]="!(navCollapsed() && !isHandset())"
        >
          <ajax-icon [name]="item.icon" />
          <span class="shell__link-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div
      class="shell__version"
      [ajaxTooltip]="navCollapsed() && !isHandset() ? 'v' + appVersion : ''"
      ajaxTooltipPosition="right"
      [ajaxTooltipDisabled]="!(navCollapsed() && !isHandset())"
    >
      <span class="shell__version-label">v{{ appVersion }}</span>
    </div>
  </div>

  <div class="shell__main">
    <ajax-toolbar class="shell__toolbar">
      <ajax-button
        variant="icon"
        [icon]="navToggleIcon()"
        [ariaLabel]="navToggleLabel()"
        (clicked)="toggleNav()"
      />
      <h1 class="shell__title">{{ pageTitle() }}</h1>
      <span class="shell__spacer"></span>
      @if (!isHandset()) {
        <span class="shell__user">
          {{ displayName() }}
          @if (roleLabel()) {
            <small>· {{ roleLabel() }}</small>
          }
        </span>
      }
      <ajax-button
        [variant]="isHandset() ? 'icon' : 'basic'"
        icon="logout"
        ariaLabel="Sign out"
        (clicked)="signOut()"
      >
        @if (!isHandset()) {
          Sign out
        }
      </ajax-button>
    </ajax-toolbar>

    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</ajax-drawer>
