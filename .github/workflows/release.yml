name: Release

on:
  push:
    branches:
      - "version/**"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, push, and release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Parse version from branch
        id: version
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ ! "$BRANCH" =~ ^version/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Branch must match version/X.Y.Z (got: $BRANCH)"
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed version: $VERSION (tag v$VERSION)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — will skip create and re-push images."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image names
        id: images
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          PREFIX="ghcr.io/${OWNER_LC}/${REPO_LC}"
          SHA_SHORT="$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "api=$PREFIX/api" >> "$GITHUB_OUTPUT"
          echo "web=$PREFIX/web" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api/GameLibrary.Api
          file: ./api/GameLibrary.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.api }}:v${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.api }}:${{ steps.images.outputs.sha_short }}
            ${{ steps.images.outputs.api }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.web }}:v${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.web }}:${{ steps.images.outputs.sha_short }}
            ${{ steps.images.outputs.web }}:latest
          build-args: |
            AUTH0_APP_ORIGIN=${{ vars.PUBLIC_ORIGIN || 'http://localhost' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: Create GitHub Release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREV="$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)"
          NOTES_FILE="$(mktemp)"
          {
            echo "## Retrojax $TAG"
            echo
            echo "Images (private GHCR):"
            echo "- \`${{ steps.images.outputs.web }}:$VERSION\`"
            echo "- \`${{ steps.images.outputs.api }}:$VERSION\`"
            echo
            if [[ -n "$PREV" ]]; then
              echo "### Changes since $PREV"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV}..HEAD"
            else
              echo "### Changes"
              echo
              git log --pretty=format:'- %s (%h)' -n 50
            fi
            echo
          } > "$NOTES_FILE"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --target "${{ github.sha }}"

  deploy:
    name: Deploy to VPS
    needs: release
    uses: ./.github/workflows/deploy.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
